<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cactus Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .soil {
        z-index: 1;
      }

      .body {
        z-index: 2;
      }

      .flower {
        animation: cactus-blossom 3.3s ease-in-out infinite;
      }

      .flower-a {
        z-index: 3;
        animation-duration: 3.45s;
        transform-origin: 38% 80%;
      }

      .flower-b {
        z-index: 4;
        animation-duration: 3.2s;
        transform-origin: 45% 80%;
      }

      .flower-c {
        z-index: 5;
        animation-duration: 3.05s;
        transform-origin: 50% 80%;
      }

      .flower-d {
        z-index: 6;
        animation-duration: 3.25s;
        transform-origin: 56% 80%;
      }

      .flower-e {
        z-index: 7;
        animation-duration: 3.55s;
        transform-origin: 62% 80%;
      }

      @keyframes cactus-blossom {
        0%, 100% {
          transform: rotate(-0.8deg) translateX(-0.25px);
        }
        50% {
          transform: rotate(0.9deg) translateX(0.25px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Cactus motion prototype</h1>
    <p>Cactus body and spines stay fixed; only blossoms move slightly.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>round</span></div>
        <div class="plant-frame stage-1">
          <img class="soil" src="cactus-stage-1-soil.png" alt="">
          <img class="body" src="cactus-stage-1-body.png" alt="">
          <img class="flower flower-a" src="cactus-stage-1-flower-a.png" alt="">
          <img class="flower flower-b" src="cactus-stage-1-flower-b.png" alt="">
          <img class="flower flower-c" src="cactus-stage-1-flower-c.png" alt="">
          <img class="flower flower-d" src="cactus-stage-1-flower-d.png" alt="">
          <img class="flower flower-e" src="cactus-stage-1-flower-e.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>pads</span></div>
        <div class="plant-frame stage-2">
          <img class="soil" src="cactus-stage-2-soil.png" alt="">
          <img class="body" src="cactus-stage-2-body.png" alt="">
          <img class="flower flower-a" src="cactus-stage-2-flower-a.png" alt="">
          <img class="flower flower-b" src="cactus-stage-2-flower-b.png" alt="">
          <img class="flower flower-c" src="cactus-stage-2-flower-c.png" alt="">
          <img class="flower flower-d" src="cactus-stage-2-flower-d.png" alt="">
          <img class="flower flower-e" src="cactus-stage-2-flower-e.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>cluster</span></div>
        <div class="plant-frame stage-3">
          <img class="soil" src="cactus-stage-3-soil.png" alt="">
          <img class="body" src="cactus-stage-3-body.png" alt="">
          <img class="flower flower-a" src="cactus-stage-3-flower-a.png" alt="">
          <img class="flower flower-b" src="cactus-stage-3-flower-b.png" alt="">
          <img class="flower flower-c" src="cactus-stage-3-flower-c.png" alt="">
          <img class="flower flower-d" src="cactus-stage-3-flower-d.png" alt="">
          <img class="flower flower-e" src="cactus-stage-3-flower-e.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>buds</span></div>
        <div class="plant-frame stage-4">
          <img class="soil" src="cactus-stage-4-soil.png" alt="">
          <img class="body" src="cactus-stage-4-body.png" alt="">
          <img class="flower flower-a" src="cactus-stage-4-flower-a.png" alt="">
          <img class="flower flower-b" src="cactus-stage-4-flower-b.png" alt="">
          <img class="flower flower-c" src="cactus-stage-4-flower-c.png" alt="">
          <img class="flower flower-d" src="cactus-stage-4-flower-d.png" alt="">
          <img class="flower flower-e" src="cactus-stage-4-flower-e.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="soil" src="cactus-stage-5-soil.png" alt="">
          <img class="body" src="cactus-stage-5-body.png" alt="">
          <img class="flower flower-a" src="cactus-stage-5-flower-a.png" alt="">
          <img class="flower flower-b" src="cactus-stage-5-flower-b.png" alt="">
          <img class="flower flower-c" src="cactus-stage-5-flower-c.png" alt="">
          <img class="flower flower-d" src="cactus-stage-5-flower-d.png" alt="">
          <img class="flower flower-e" src="cactus-stage-5-flower-e.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
