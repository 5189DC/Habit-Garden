<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sprout Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .soil {
        z-index: 1;
      }

      .leaves {
        z-index: 2;
        animation: sprout-sway 3.2s ease-in-out infinite;
        transform-origin: 50% 90%;
      }

      .base {
        z-index: 3;
      }

      @keyframes sprout-sway {
        0%, 100% {
          transform: rotate(-1.15deg) translateX(-0.35px);
        }
        50% {
          transform: rotate(1.2deg) translateX(0.35px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Sprout motion prototype</h1>
    <p>Soil and lower base stay fixed; the leaf cluster sways softly.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>seedling</span></div>
        <div class="plant-frame stage-1">
          <img class="soil" src="sprout-stage-1-soil.png" alt="">
          <img class="leaves" src="sprout-stage-1-leaves-moving.png" alt="">
          <img class="base" src="sprout-stage-1-base-overlay.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>young</span></div>
        <div class="plant-frame stage-2">
          <img class="soil" src="sprout-stage-2-soil.png" alt="">
          <img class="leaves" src="sprout-stage-2-leaves-moving.png" alt="">
          <img class="base" src="sprout-stage-2-base-overlay.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>leafy</span></div>
        <div class="plant-frame stage-3">
          <img class="soil" src="sprout-stage-3-soil.png" alt="">
          <img class="leaves" src="sprout-stage-3-leaves-moving.png" alt="">
          <img class="base" src="sprout-stage-3-base-overlay.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>cluster</span></div>
        <div class="plant-frame stage-4">
          <img class="soil" src="sprout-stage-4-soil.png" alt="">
          <img class="leaves" src="sprout-stage-4-leaves-moving.png" alt="">
          <img class="base" src="sprout-stage-4-base-overlay.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="soil" src="sprout-stage-5-soil.png" alt="">
          <img class="leaves" src="sprout-stage-5-leaves-moving.png" alt="">
          <img class="base" src="sprout-stage-5-base-overlay.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
