<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lavender Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .soil {
        z-index: 1;
      }

      .spike {
        animation: lavender-sway 3.4s ease-in-out infinite;
      }

      .spike-a {
        z-index: 2;
        animation-duration: 3.55s;
        transform-origin: 42% 83%;
      }

      .spike-b {
        z-index: 3;
        animation-duration: 3.3s;
        transform-origin: 46% 83%;
      }

      .spike-c {
        z-index: 4;
        animation-duration: 3.12s;
        transform-origin: 50% 83%;
      }

      .spike-d {
        z-index: 5;
        animation-duration: 3.38s;
        transform-origin: 54% 83%;
      }

      .spike-e {
        z-index: 6;
        animation-duration: 3.65s;
        transform-origin: 58% 83%;
      }

      .base {
        z-index: 7;
      }

      .stage-1 .spike {
        animation: none;
      }

      @keyframes lavender-sway {
        0%, 100% {
          transform: rotate(-1.05deg) translateX(-0.35px);
        }
        50% {
          transform: rotate(1.15deg) translateX(0.35px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Lavender motion prototype</h1>
    <p>Lower foliage stays fixed; lavender spikes sway in small separate groups.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>shoots</span></div>
        <div class="plant-frame stage-1">
          <img class="soil" src="lavender-stage-1-soil.png" alt="">
          <img class="spike spike-a" src="lavender-stage-1-spike-a.png" alt="">
          <img class="spike spike-b" src="lavender-stage-1-spike-b.png" alt="">
          <img class="spike spike-c" src="lavender-stage-1-spike-c.png" alt="">
          <img class="spike spike-d" src="lavender-stage-1-spike-d.png" alt="">
          <img class="spike spike-e" src="lavender-stage-1-spike-e.png" alt="">
          <img class="base" src="lavender-stage-1-base.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>first spikes</span></div>
        <div class="plant-frame stage-2">
          <img class="soil" src="lavender-stage-2-soil.png" alt="">
          <img class="spike spike-a" src="lavender-stage-2-spike-a.png" alt="">
          <img class="spike spike-b" src="lavender-stage-2-spike-b.png" alt="">
          <img class="spike spike-c" src="lavender-stage-2-spike-c.png" alt="">
          <img class="spike spike-d" src="lavender-stage-2-spike-d.png" alt="">
          <img class="spike spike-e" src="lavender-stage-2-spike-e.png" alt="">
          <img class="base" src="lavender-stage-2-base.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>sprigs</span></div>
        <div class="plant-frame stage-3">
          <img class="soil" src="lavender-stage-3-soil.png" alt="">
          <img class="spike spike-a" src="lavender-stage-3-spike-a.png" alt="">
          <img class="spike spike-b" src="lavender-stage-3-spike-b.png" alt="">
          <img class="spike spike-c" src="lavender-stage-3-spike-c.png" alt="">
          <img class="spike spike-d" src="lavender-stage-3-spike-d.png" alt="">
          <img class="spike spike-e" src="lavender-stage-3-spike-e.png" alt="">
          <img class="base" src="lavender-stage-3-base.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>bundle</span></div>
        <div class="plant-frame stage-4">
          <img class="soil" src="lavender-stage-4-soil.png" alt="">
          <img class="spike spike-a" src="lavender-stage-4-spike-a.png" alt="">
          <img class="spike spike-b" src="lavender-stage-4-spike-b.png" alt="">
          <img class="spike spike-c" src="lavender-stage-4-spike-c.png" alt="">
          <img class="spike spike-d" src="lavender-stage-4-spike-d.png" alt="">
          <img class="spike spike-e" src="lavender-stage-4-spike-e.png" alt="">
          <img class="base" src="lavender-stage-4-base.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="soil" src="lavender-stage-5-soil.png" alt="">
          <img class="spike spike-a" src="lavender-stage-5-spike-a.png" alt="">
          <img class="spike spike-b" src="lavender-stage-5-spike-b.png" alt="">
          <img class="spike spike-c" src="lavender-stage-5-spike-c.png" alt="">
          <img class="spike spike-d" src="lavender-stage-5-spike-d.png" alt="">
          <img class="spike spike-e" src="lavender-stage-5-spike-e.png" alt="">
          <img class="base" src="lavender-stage-5-base.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
