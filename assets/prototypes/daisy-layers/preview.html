<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daisy Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .original {
        opacity: 0.42;
        filter: saturate(0.9);
      }

      .soil {
        z-index: 1;
      }

      .foliage {
        z-index: 2;
        animation: daisy-leaves 3.1s ease-in-out infinite;
        transform-origin: 50% 88%;
      }

      .stems,
      .heads {
        z-index: 3;
        animation: daisy-stems 2.9s ease-in-out infinite;
        transform-origin: 50% 88%;
      }

      .heads {
        z-index: 4;
      }

      .stage-1 .foliage {
        animation-duration: 3.4s;
      }

      .stage-1 .stems,
      .stage-1 .heads {
        animation: none;
      }

      @keyframes daisy-leaves {
        0%, 100% {
          transform: rotate(-0.8deg) translateX(-0.5px);
        }
        50% {
          transform: rotate(0.9deg) translateX(0.5px);
        }
      }

      @keyframes daisy-stems {
        0%, 100% {
          transform: rotate(-2deg) translateX(-1px);
        }
        50% {
          transform: rotate(2.2deg) translateX(1px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Daisy motion prototype</h1>
    <p>Original drawing ghosted behind it; soil stays fixed, leaves and flower stems sway.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>sprout</span></div>
        <div class="plant-frame stage-1">
          <img class="original" src="../../plants/daisy-stage-1.png" alt="">
          <img class="soil" src="daisy-stage-1-soil.png" alt="">
          <img class="foliage" src="daisy-stage-1-foliage.png" alt="">
          <img class="stems" src="daisy-stage-1-stems.png" alt="">
          <img class="heads" src="daisy-stage-1-flower-heads.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>buds</span></div>
        <div class="plant-frame stage-2">
          <img class="original" src="../../plants/daisy-stage-2.png" alt="">
          <img class="soil" src="daisy-stage-2-soil.png" alt="">
          <img class="foliage" src="daisy-stage-2-foliage.png" alt="">
          <img class="stems" src="daisy-stage-2-stems.png" alt="">
          <img class="heads" src="daisy-stage-2-flower-heads.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>opening</span></div>
        <div class="plant-frame stage-3">
          <img class="original" src="../../plants/daisy-stage-3.png" alt="">
          <img class="soil" src="daisy-stage-3-soil.png" alt="">
          <img class="foliage" src="daisy-stage-3-foliage.png" alt="">
          <img class="stems" src="daisy-stage-3-stems.png" alt="">
          <img class="heads" src="daisy-stage-3-flower-heads.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>bloom</span></div>
        <div class="plant-frame stage-4">
          <img class="original" src="../../plants/daisy-stage-4.png" alt="">
          <img class="soil" src="daisy-stage-4-soil.png" alt="">
          <img class="foliage" src="daisy-stage-4-foliage.png" alt="">
          <img class="stems" src="daisy-stage-4-stems.png" alt="">
          <img class="heads" src="daisy-stage-4-flower-heads.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="original" src="../../plants/daisy-stage-5.png" alt="">
          <img class="soil" src="daisy-stage-5-soil.png" alt="">
          <img class="foliage" src="daisy-stage-5-foliage.png" alt="">
          <img class="stems" src="daisy-stage-5-stems.png" alt="">
          <img class="heads" src="daisy-stage-5-flower-heads.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
