<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sunflower Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: hidden;
      }

      .label {
        display: flex;
        justify-content: space-between;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .original {
        display: none;
      }

      .soil {
        z-index: 1;
      }

      .motion-gif {
        z-index: 4;
      }

      .stem {
        z-index: 2;
        animation: sunflower-leaves 2.8s ease-in-out infinite;
        transform-origin: 50% 88%;
      }

      .head {
        z-index: 3;
        animation: sunflower-head 2.6s ease-in-out infinite;
        transform-origin: 50% 63%;
      }

      .stage-1 .stem {
        animation-duration: 3.2s;
        transform-origin: 50% 92%;
      }

      .stage-2 .stem,
      .stage-2 .head,
      .stage-3 .stem,
      .stage-3 .head {
        animation: sunflower-young 3.1s ease-in-out infinite;
        transform-origin: 50% 88%;
      }

      @keyframes sunflower-leaves {
        0%, 100% {
          transform: rotate(-1.4deg) translateX(-1px);
        }
        50% {
          transform: rotate(1.6deg) translateX(1px);
        }
      }

      @keyframes sunflower-head {
        0%, 100% {
          transform: rotate(-2.4deg) translate(-1px, 0);
        }
        50% {
          transform: rotate(2deg) translate(1px, 1px);
        }
      }

      @keyframes sunflower-young {
        0%, 100% {
          transform: rotate(-1.3deg) translateX(-0.6px);
        }
        50% {
          transform: rotate(1.4deg) translateX(0.6px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Sunflower motion prototype</h1>
    <p>Cleaner stage 2 and 3; the preview now shows only the moving layers.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>sprout</span></div>
        <div class="plant-frame stage-1">
          <img class="original" src="../../plants/sunflower-stage-1.png" alt="">
          <img class="soil" src="sunflower-stage-1-soil-distinct.png" alt="">
          <img class="stem" src="sunflower-stage-1-stem-leaves-distinct.png" alt="">
          <img class="head" src="sunflower-stage-1-flower-head-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>bud</span></div>
        <div class="plant-frame stage-2">
          <img class="original" src="../../plants/sunflower-stage-2.png" alt="">
          <img class="soil" src="sunflower-stage-2-soil-distinct.png" alt="">
          <img class="stem" src="sunflower-stage-2-stem-leaves-distinct.png" alt="">
          <img class="head" src="sunflower-stage-2-flower-head-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>opening</span></div>
        <div class="plant-frame stage-3">
          <img class="motion-gif" src="sunflower-stage-3-motion-distinct.gif" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>bloom</span></div>
        <div class="plant-frame stage-4">
          <img class="original" src="../../plants/sunflower-stage-4.png" alt="">
          <img class="soil" src="sunflower-stage-4-soil-distinct.png" alt="">
          <img class="stem" src="sunflower-stage-4-stem-leaves-distinct.png" alt="">
          <img class="head" src="sunflower-stage-4-flower-head-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="original" src="../../plants/sunflower-stage-5.png" alt="">
          <img class="soil" src="sunflower-stage-5-soil-distinct.png" alt="">
          <img class="stem" src="sunflower-stage-5-stem-leaves-distinct.png" alt="">
          <img class="head" src="sunflower-stage-5-flower-head-distinct.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
