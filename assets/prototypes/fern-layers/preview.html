<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fern Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .soil {
        z-index: 1;
      }

      .fronds {
        z-index: 2;
        animation: fern-sway 3.4s ease-in-out infinite;
        transform-origin: 50% 88%;
      }

      .crown {
        z-index: 3;
      }

      .stage-1 .fronds {
        animation-duration: 3.7s;
        transform-origin: 50% 91%;
      }

      @keyframes fern-sway {
        0%, 100% {
          transform: rotate(-1.2deg) translateX(-0.45px);
        }
        50% {
          transform: rotate(1.25deg) translateX(0.45px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Fern motion prototype</h1>
    <p>Soil stays fixed; the fronds sway gently with a fixed crown overlay hiding the base.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>curl</span></div>
        <div class="plant-frame stage-1">
          <img class="soil" src="fern-stage-1-soil-v2.png" alt="">
          <img class="fronds" src="fern-stage-1-fronds-v2.png" alt="">
          <img class="crown" src="fern-stage-1-crown-v2.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>unfurl</span></div>
        <div class="plant-frame stage-2">
          <img class="soil" src="fern-stage-2-soil-v2.png" alt="">
          <img class="fronds" src="fern-stage-2-fronds-v2.png" alt="">
          <img class="crown" src="fern-stage-2-crown-v2.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>spread</span></div>
        <div class="plant-frame stage-3">
          <img class="soil" src="fern-stage-3-soil-v2.png" alt="">
          <img class="fronds" src="fern-stage-3-fronds-v2.png" alt="">
          <img class="crown" src="fern-stage-3-crown-v2.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>lush</span></div>
        <div class="plant-frame stage-4">
          <img class="soil" src="fern-stage-4-soil-v2.png" alt="">
          <img class="fronds" src="fern-stage-4-fronds-v2.png" alt="">
          <img class="crown" src="fern-stage-4-crown-v2.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="soil" src="fern-stage-5-soil-v2.png" alt="">
          <img class="fronds" src="fern-stage-5-fronds-v2.png" alt="">
          <img class="crown" src="fern-stage-5-crown-v2.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
