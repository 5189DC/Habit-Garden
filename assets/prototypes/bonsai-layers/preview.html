<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bonsai Layer Motion Prototype</title>
    <style>
      :root {
        color: #223029;
        background: #f8f4e9;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 48px);
        line-height: 1;
      }

      p {
        margin: 0 0 24px;
        color: #617169;
        font-weight: 700;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(150px, 1fr));
        gap: 18px;
      }

      .card {
        background: linear-gradient(#eaf7f4, #fbfbea);
        border: 1px solid #d6d2c6;
        border-radius: 8px;
        overflow: visible;
      }

      .label {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px 0;
        color: #617169;
        font-weight: 800;
      }

      .plant-frame {
        position: relative;
        width: min(100%, 240px);
        aspect-ratio: 4 / 3;
        margin: 8px auto 2px;
        overflow: visible;
      }

      .plant-frame img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        transform-box: fill-box;
        pointer-events: none;
      }

      .original {
        opacity: 0.38;
        filter: saturate(0.88);
      }

      .fixed {
        z-index: 2;
      }

      .canopy {
        z-index: 3;
        animation: bonsai-canopy 3.4s ease-in-out infinite;
        transform-origin: 50% 74%;
      }

      .stage-1 .canopy {
        animation-duration: 3.8s;
        transform-origin: 50% 72%;
      }

      @keyframes bonsai-canopy {
        0%, 100% {
          transform: rotate(-1.1deg) translateX(-0.7px);
        }
        50% {
          transform: rotate(1.2deg) translateX(0.7px);
        }
      }

      @media (max-width: 760px) {
        body {
          padding: 18px;
        }

        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <h1>Bonsai motion prototype</h1>
    <p>More distinct growth stages; pot and trunk stay fixed, canopy moves lightly.</p>
    <main class="grid">
      <section class="card">
        <div class="label"><span>Stage 1</span><span>young</span></div>
        <div class="plant-frame stage-1">
          <img class="original" src="bonsai-stage-1-clean-distinct.png" alt="">
          <img class="fixed" src="bonsai-stage-1-pot-trunk-distinct.png" alt="">
          <img class="canopy" src="bonsai-stage-1-canopy-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 2</span><span>shaping</span></div>
        <div class="plant-frame stage-2">
          <img class="original" src="bonsai-stage-2-clean-distinct.png" alt="">
          <img class="fixed" src="bonsai-stage-2-pot-trunk-distinct.png" alt="">
          <img class="canopy" src="bonsai-stage-2-canopy-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 3</span><span>branching</span></div>
        <div class="plant-frame stage-3">
          <img class="original" src="bonsai-stage-3-clean-distinct.png" alt="">
          <img class="fixed" src="bonsai-stage-3-pot-trunk-distinct.png" alt="">
          <img class="canopy" src="bonsai-stage-3-canopy-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 4</span><span>trained</span></div>
        <div class="plant-frame stage-4">
          <img class="original" src="bonsai-stage-4-clean-distinct.png" alt="">
          <img class="fixed" src="bonsai-stage-4-pot-trunk-distinct.png" alt="">
          <img class="canopy" src="bonsai-stage-4-canopy-distinct.png" alt="">
        </div>
      </section>
      <section class="card">
        <div class="label"><span>Stage 5</span><span>full</span></div>
        <div class="plant-frame stage-5">
          <img class="original" src="bonsai-stage-5-clean-distinct.png" alt="">
          <img class="fixed" src="bonsai-stage-5-pot-trunk-distinct.png" alt="">
          <img class="canopy" src="bonsai-stage-5-canopy-distinct.png" alt="">
        </div>
      </section>
    </main>
  </body>
</html>
