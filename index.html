<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#dfe8c7" />
    <meta name="apple-mobile-web-app-title" content="Habit Garden" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Habit Garden</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/app-icon.svg" />
    <link rel="stylesheet" href="styles.css?v=0.2.2-hide-test" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Garden overview">
        <div>
          <p class="eyebrow">Habit Garden</p>
          <h1>Water your habits. Grow your garden.</h1>
        </div>
        <div class="stats" aria-label="Garden statistics">
          <div>
            <span id="totalWatered">0</span>
            <small>waterings</small>
          </div>
          <div>
            <span id="plantsBloomed">0</span>
            <small>blooms</small>
          </div>
        </div>
      </section>

      <section class="workspace">
        <form class="habit-form" id="habitForm">
          <div class="form-header">
            <h2>Add a habit</h2>
            <p>Pick the action, then choose the plant it should become.</p>
          </div>
          <div class="starter-suggestions" id="starterSuggestions" aria-label="Starter habit suggestions"></div>

          <label>
            Habit name
            <input
              id="habitName"
              name="habitName"
              type="text"
              autocomplete="off"
              maxlength="42"
              placeholder="Example: Read 10 pages"
              required
            />
          </label>

          <fieldset>
            <legend>Choose a plant</legend>
            <div class="plant-picker" id="plantPicker"></div>
          </fieldset>

          <fieldset>
            <legend>Choose watering days</legend>
            <div class="schedule-picker" id="schedulePicker"></div>
          </fieldset>

          <button class="primary-action" type="submit">Plant habit</button>
        </form>

        <section class="garden-panel" aria-label="Your garden">
          <div class="panel-heading">
            <div>
              <h2>Your garden</h2>
              <p id="gardenSubtitle">Each completion waters a plant once.</p>
            </div>
            <div class="panel-actions">
              <label class="test-mode-toggle" hidden>
                <input id="testWateringMode" type="checkbox" />
                <span>Test watering</span>
              </label>
              <button class="ghost-action" id="exportGarden" type="button">Export</button>
              <label class="ghost-action import-action">
                Import
                <input id="importGarden" type="file" accept="application/json,.json" />
              </label>
            </div>
          </div>

          <div class="garden-tabs" role="tablist" aria-label="Garden views">
            <button class="garden-tab is-active" id="gardenTab" type="button" role="tab" aria-selected="true" aria-controls="gardenView" data-view="garden">
              Your garden
            </button>
            <button class="garden-tab" id="calendarTab" type="button" role="tab" aria-selected="false" aria-controls="calendarView" data-view="calendar">
              Calendar
            </button>
          </div>

          <div class="tab-view is-active" id="gardenView" role="tabpanel" aria-labelledby="gardenTab">
            <div class="weather-actions">
              <span id="weatherStatus" aria-live="polite">Garden sky is syncing...</span>
              <button class="ghost-action" id="useLocation" type="button">Use my location</button>
            </div>
            <div class="garden-insights" id="gardenInsights" aria-label="Garden insights"></div>
            <div class="reward-strip" id="rewardStrip" aria-label="Garden rewards"></div>
            <div class="garden-bed" id="gardenBed" aria-label="Garden bed with 10 plant plots"></div>
            <div class="garden-grid" id="gardenGrid" aria-label="Habit details"></div>
          </div>

          <div class="tab-view" id="calendarView" role="tabpanel" aria-labelledby="calendarTab" hidden>
            <div class="calendar-toolbar">
              <button class="ghost-action calendar-nav" id="previousMonth" type="button" aria-label="Previous month">&lsaquo;</button>
              <label>
                Month
                <select id="calendarMonth"></select>
              </label>
              <label>
                Year
                <select id="calendarYear"></select>
              </label>
              <button class="ghost-action calendar-nav" id="nextMonth" type="button" aria-label="Next month">&rsaquo;</button>
            </div>
            <div class="calendar-summary" id="calendarSummary"></div>
            <div class="calendar-weekdays" aria-hidden="true">
              <span>Sun</span>
              <span>Mon</span>
              <span>Tue</span>
              <span>Wed</span>
              <span>Thu</span>
              <span>Fri</span>
              <span>Sat</span>
            </div>
            <div class="calendar-grid" id="calendarGrid" aria-label="Habit calendar"></div>
            <div class="calendar-agenda" id="calendarAgenda" aria-label="Habit calendar events"></div>
            <div class="calendar-detail" id="calendarDetail" aria-live="polite"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="habitCardTemplate">
      <article class="habit-card">
        <div class="plant-scene" aria-hidden="true"></div>
        <div class="habit-info">
          <div>
            <h3></h3>
            <p class="plant-name"></p>
            <p class="last-watered"></p>
          </div>
          <div class="card-actions">
            <button class="water-button" type="button">Water</button>
            <button class="edit-plant-button" type="button">Edit</button>
            <button class="reset-plant-button" type="button">Reset</button>
            <button class="remove-plant-button" type="button">Remove</button>
          </div>
        </div>
        <div class="progress-wrap">
          <div class="progress-copy"></div>
          <div class="progress-track">
            <span></span>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js?v=0.2.2"></script>
  </body>
</html>
